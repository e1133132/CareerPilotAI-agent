name: careerpilot-ai

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: careerpilot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - careerpilot-network
    restart: unless-stopped

volumes:
  qdrant_storage:

networks:
  careerpilot-network:
