name: CareerPilot AI CI

on:
  push:
    branches: ["**"]
    paths:
      - '**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: ["**"]
    paths:
      - '**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

defaults:
  run:
    working-directory: .

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with Ruff
        run: ruff check api.py config.py tools tests security agents

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run all unit tests with reports
        run: |
          mkdir -p test-results coverage
          PYTHONPATH=. pytest tests/unit -v --tb=short \
            --junitxml=test-results/junit.xml \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage/coverage.xml \
            --cov-report=html:coverage/html

      - name: Publish unit test report
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-artifacts
          path: |
            test-results/junit.xml
            coverage/coverage.xml
            coverage/html

      - name: Add test summary
        if: always()
        run: |
          echo "## Unit Test Report" >> $GITHUB_STEP_SUMMARY
          echo "- Ran: \`pytest tests/unit\` (all unit tests)" >> $GITHUB_STEP_SUMMARY
          echo "- JUnit report: \`test-results/junit.xml\`" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage XML: \`coverage/coverage.xml\`" >> $GITHUB_STEP_SUMMARY
          echo "- HTML coverage uploaded as artifact: \`unit-test-artifacts\`" >> $GITHUB_STEP_SUMMARY

  promptfoo-evals:
    name: Promptfoo Evals
    runs-on: ubuntu-latest
    needs: test
    if: ${{ settings.OPENAI_API_KEY  != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Promptfoo evals for all agents
        env:
          OPENAI_API_KEY: ${{ settings.OPENAI_API_KEY  }}
        run: |
          mkdir -p promptfoo-results
          npx promptfoo@latest eval -c promptfoo/resume_analysis_promptfooconfig.yaml --output promptfoo-results/resume_analysis.json
          npx promptfoo@latest eval -c promptfoo/job_matching_promptfooconfig.yaml --output promptfoo-results/job_matching.json
          npx promptfoo@latest eval -c promptfoo/promptfooconfig.yaml --output promptfoo-results/skill_gap.json
          npx promptfoo@latest eval -c promptfoo/study_planning_promptfooconfig.yaml --output promptfoo-results/study_planning.json

      - name: Upload Promptfoo artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-eval-artifacts
          path: promptfoo-results/

      - name: Add Promptfoo summary
        if: always()
        run: |
          echo "## Promptfoo Eval Report" >> $GITHUB_STEP_SUMMARY
          echo "- Ran 4 single-point eval suites: resume_analysis, job_matching, skill_gap, study_planning" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts uploaded as: \`promptfoo-eval-artifacts\`" >> $GITHUB_STEP_SUMMARY

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: cbchanhanbear/career_pilot_ai
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: cbchanhanbear/career_pilot_ai:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'
        with:
          scan-type: fs
          scan-ref: .
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'
        with:
          image-ref: cbchanhanbear/career_pilot_ai:scan
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: cbchanhanbear
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max